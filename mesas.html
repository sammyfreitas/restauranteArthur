<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesas - Restaurante do Arthur</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body onload="inicializarPagina('mesas')">

  <header class="topo">
    <div class="container topo-conteudo">
      <div class="logo-area">
        <h1>Restaurante do Arthur</h1>
        <p>Módulo de Mesas</p>
      </div>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="mesas.html">Mesas</a>
        <a href="garcons.html">Garçons</a>
        <a href="pedidos.html">Pedidos</a>
      </nav>
    </div>
  </header>

  <main class="pagina-interna">
    <div class="container">
      <section class="titulo-pagina">
        <h2>Cadastro de Mesas</h2>
        <p>Gerencie mesas, capacidade e status do salão.</p>
      </section>

      <section class="crud-grid">
        <div class="card-form">
          <h3>Formulário</h3>
          <form id="formMesa">
            <input type="hidden" id="mesaId" />

            <label for="mesaNumero">Número da Mesa</label>
            <input type="number" id="mesaNumero" placeholder="Digite o número" required />

            <label for="mesaCapacidade">Capacidade</label>
            <input type="number" id="mesaCapacidade" placeholder="Digite a capacidade" required />

            <label for="mesaStatus">Status</label>
            <select id="mesaStatus" required>
              <option value="">Selecione</option>
              <option value="LIVRE">LIVRE</option>
              <option value="OCUPADA">OCUPADA</option>
              <option value="RESERVADA">RESERVADA</option>
            </select>

            <div class="acoes-form">
              <button type="submit" class="btn-card">Salvar</button>
              <button type="button" class="btn-neutro" onclick="limparFormularioMesa()">Limpar</button>
            </div>
          </form>
        </div>

        <div class="card-tabela">
          <div class="topo-tabela">
            <h3>Lista de Mesas</h3>
            <input type="text" id="buscaMesa" placeholder="Buscar por status..." onkeyup="filtrarMesas()" />
          </div>

          <div class="tabela-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Número</th>
                  <th>Capacidade</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaMesas"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="alertaContainer"></div>

  <script src="script.js"></script>
</body>
</html>

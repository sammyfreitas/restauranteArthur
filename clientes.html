<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes - Restaurante do Arthur</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body onload="inicializarPagina('clientes')">

  <header class="topo">
    <div class="container topo-conteudo">
      <div class="logo-area">
        <h1>Restaurante do Arthur</h1>
        <p>Módulo de Clientes</p>
      </div>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="mesas.html">Mesas</a>
        <a href="garcons.html">Garçons</a>
        <a href="pedidos.html">Pedidos</a>
      </nav>
    </div>
  </header>

  <main class="pagina-interna">
    <div class="container">
      <section class="titulo-pagina">
        <h2>Cadastro de Clientes</h2>
        <p>Adicione, edite, exclua e visualize clientes cadastrados.</p>
      </section>

      <section class="crud-grid">
        <div class="card-form">
          <h3>Formulário</h3>
          <form id="formCliente">
            <input type="hidden" id="clienteId" />

            <label for="clienteNome">Nome</label>
            <input type="text" id="clienteNome" placeholder="Digite o nome" required />

            <label for="clienteTelefone">Telefone</label>
            <input type="text" id="clienteTelefone" placeholder="Digite o telefone" required />

            <label for="clienteEmail">E-mail</label>
            <input type="email" id="clienteEmail" placeholder="Digite o e-mail" required />

            <div class="acoes-form">
              <button type="submit" class="btn-card">Salvar</button>
              <button type="button" class="btn-neutro" onclick="limparFormularioCliente()">Limpar</button>
            </div>
          </form>
        </div>

        <div class="card-tabela">
          <div class="topo-tabela">
            <h3>Lista de Clientes</h3>
            <input type="text" id="buscaCliente" placeholder="Buscar por nome..." onkeyup="filtrarClientes()" />
          </div>

          <div class="tabela-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Telefone</th>
                  <th>E-mail</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaClientes"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="alertaContainer"></div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos - Restaurante do Arthur</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body onload="inicializarPagina('pedidos')">

  <header class="topo">
    <div class="container topo-conteudo">
      <div class="logo-area">
        <h1>Restaurante do Arthur</h1>
        <p>Módulo de Pedidos</p>
      </div>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="mesas.html">Mesas</a>
        <a href="garcons.html">Garçons</a>
        <a href="pedidos.html">Pedidos</a>
      </nav>
    </div>
  </header>

  <main class="pagina-interna">
    <div class="container">
      <section class="titulo-pagina">
        <h2>Cadastro de Pedidos</h2>
        <p>Registre pedidos relacionando cliente, mesa e garçom.</p>
      </section>

      <section class="crud-grid">
        <div class="card-form">
          <h3>Formulário</h3>
          <form id="formPedido">
            <input type="hidden" id="pedidoId" />

            <label for="pedidoData">Data do Pedido</label>
            <input type="date" id="pedidoData" required />

            <label for="pedidoValor">Valor Total</label>
            <input type="number" step="0.01" id="pedidoValor" placeholder="Digite o valor total" required />

            <label for="pedidoStatus">Status</label>
            <select id="pedidoStatus" required>
              <option value="">Selecione</option>
              <option value="ABERTO">ABERTO</option>
              <option value="EM_PREPARO">EM PREPARO</option>
              <option value="FINALIZADO">FINALIZADO</option>
              <option value="PAGO">PAGO</option>
            </select>

            <label for="pedidoCliente">Cliente</label>
            <select id="pedidoCliente" required></select>

            <label for="pedidoMesa">Mesa</label>
            <select id="pedidoMesa" required></select>

            <label for="pedidoGarcom">Garçom</label>
            <select id="pedidoGarcom" required></select>

            <div class="acoes-form">
              <button type="submit" class="btn-card">Salvar</button>
              <button type="button" class="btn-neutro" onclick="limparFormularioPedido()">Limpar</button>
            </div>
          </form>
        </div>

        <div class="card-tabela">
          <div class="topo-tabela">
            <h3>Lista de Pedidos</h3>
            <input type="text" id="buscaPedido" placeholder="Buscar por status..." onkeyup="filtrarPedidos()" />
          </div>

          <div class="tabela-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Data</th>
                  <th>Valor</th>
                  <th>Status</th>
                  <th>Cliente</th>
                  <th>Mesa</th>
                  <th>Garçom</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaPedidos"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="alertaContainer"></div>

  <script src="script.js"></script>
</body>
</html>
